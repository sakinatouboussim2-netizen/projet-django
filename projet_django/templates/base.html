<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titre %}Projet Django{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f6f9;
            color: #333;
        }
        nav {
            background: #2c3e50;
            padding: 0 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            height: 55px;
        }
        nav a {
            color: #ecf0f1;
            text-decoration: none;
            font-size: 15px;
            padding: 6px 14px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        nav a:hover { background: #3d5166; }
        nav .brand {
            font-weight: bold;
            font-size: 17px;
            margin-right: 20px;
            color: #fff;
        }
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }
        h1 { color: #2c3e50; margin-bottom: 15px; }
        h2 { color: #34495e; margin: 20px 0 10px; }
        p { margin-bottom: 12px; line-height: 1.6; }
        .card {
            background: #fff;
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .btn {
            display: inline-block;
            padding: 9px 20px;
            background: #2980b9;
            color: #fff;
            border-radius: 5px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .btn:hover { background: #1f6391; }
        .btn-green { background: #27ae60; }
        .btn-green:hover { background: #1e8449; }
        .btn-orange { background: #e67e22; }
        .btn-orange:hover { background: #ca6f1e; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px 14px;
            text-align: left;
        }
        th { background: #2c3e50; color: #fff; }
        tr:nth-child(even) { background: #f9f9f9; }
        .oui { color: #27ae60; font-weight: bold; }
        .non { color: #e74c3c; font-weight: bold; }
        .erreur {
            background: #fdecea;
            border-left: 4px solid #e74c3c;
            padding: 12px 16px;
            border-radius: 4px;
            margin: 15px 0;
        }
        .succes {
            background: #eafaf1;
            border-left: 4px solid #27ae60;
            padding: 12px 16px;
            border-radius: 4px;
            margin: 15px 0;
        }
        .info {
            background: #eaf4fb;
            border-left: 4px solid #2980b9;
            padding: 12px 16px;
            border-radius: 4px;
            margin: 15px 0;
        }
        .finally-box {
            background: #fff9e6;
            border-left: 4px solid #f39c12;
            padding: 12px 16px;
            border-radius: 4px;
            margin: 15px 0;
            font-style: italic;
        }
        form { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="number"] {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            margin-bottom: 12px;
            width: 200px;
        }
        code {
            background: #f4f4f4;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        .grid-cartes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .carte {
            background: #fff;
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-align: center;
        }
        .carte h2 { margin-bottom: 10px; }
        .carte p { color: #666; margin-bottom: 15px; }
    </style>
</head>
<body>
    <nav>
        <span class="brand">Projet Django</span>
        <a href="/">Accueil</a>
        <a href="/des/">Des</a>
        <a href="/exceptions/">Exceptions</a>
        <a href="/poo/">POO</a>
    </nav>
    <div class="container">
        {% block contenu %}
        {% endblock %}
    </div>
</body>
</html>
